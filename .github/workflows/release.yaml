name: Release

on:
  push:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/ci.yaml
    secrets: inherit
    permissions:
      contents: write
      pull-requests: write
      packages: write
      attestations: write
      id-token: write

  release:
    needs: ci
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    name: Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v6
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/exec
            @semantic-release/git
            @semantic-release/github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'

      - name: Build the Docker image
        if: steps.semantic.outputs.new_release_published == 'true'
        run: docker build . --file Dockerfile --tag martynvandijke/traces:latest --tag ghcr.io/martynvdijke/traces:latest
        
      - name: Push Docker image
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          VERSION=${{ steps.semantic.outputs.new_release_version }}
          docker tag martynvandijke/traces:latest martynvandijke/traces:$VERSION
          docker tag ghcr.io/martynvdijke/traces:latest ghcr.io/martynvdijke/traces:$VERSION
          
          docker push martynvandijke/traces:latest
          docker push martynvandijke/traces:$VERSION
          docker push ghcr.io/martynvdijke/traces:latest
          docker push ghcr.io/martynvdijke/traces:$VERSION