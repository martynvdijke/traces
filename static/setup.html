<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRACES - Setup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <script>
      (function(){var t=localStorage.getItem('theme');if(!t){t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'}document.documentElement.setAttribute('data-theme',t)})();
      (function(){function a(){document.documentElement.classList.add('eink-mode');var l=document.createElement('link');l.rel='stylesheet';l.href='/static/eink.css';document.head.appendChild(l)}var e=new URLSearchParams(window.location.search).get('eink');if(e==='1'){document.cookie='eink=1;path=/;max-age='+31536000;a()}else if(e==='0'){document.cookie='eink=;path=/;max-age=0'}else{var c=document.cookie.split(';');for(var i=0;i<c.length;i++){if(c[i].trim().indexOf('eink=1')===0){a();break}}}fetch('/api/config').then(function(r){return r.json()}).then(function(c){if(c.eink_enabled&&!document.documentElement.classList.contains('eink-mode')){a()}}).catch(function(){})})();
    </script>
    <style>
        :root {
            --primary: #7c3aed;
            --card-bg: #ffffff;
            --card-text: #0f172a;
            --input-bg: #ffffff;
            --input-border: #e2e8f0;
            --input-text: #0f172a;
            --muted: #64748b;
            --body-start: #667eea;
            --body-end: #764ba2;
        }
        [data-theme="dark"] {
            --card-bg: #1e293b;
            --card-text: #e2e8f0;
            --input-bg: #1e293b;
            --input-border: #334155;
            --input-text: #e2e8f0;
            --muted: #94a3b8;
            --body-start: #1e1b4b;
            --body-end: #4c1d95;
        }
        body {
            background: linear-gradient(135deg, var(--body-start) 0%, var(--body-end) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .setup-card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            color: var(--card-text);
        }
        .setup-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .setup-logo img {
            width: 60px;
            height: 60px;
            border-radius: 12px;
        }
        .setup-logo h1 {
            font-family: 'Space Mono', monospace;
            font-size: 1.5rem;
            color: #7c3aed;
            margin-top: 0.5rem;
        }
        .form-control {
            background: var(--input-bg);
            border-color: var(--input-border);
            color: var(--input-text);
        }
        .form-control:focus {
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
            background: var(--input-bg);
            color: var(--input-text);
        }
        .btn-primary {
            background: #7c3aed;
            border-color: #7c3aed;
        }
        .btn-primary:hover {
            background: #6d28d9;
            border-color: #6d28d9;
        }
        .theme-toggle {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: var(--card-bg);
            border: 1px solid var(--input-border);
            color: var(--card-text);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.1rem;
            z-index: 10;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .theme-toggle:hover {
            transform: scale(1.1);
        }
        .text-muted {
            color: var(--muted) !important;
        }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
        <i class="fa-solid fa-moon" id="theme-icon"></i>
    </button>
    <div class="setup-card">
        <div class="setup-logo">
            <img src="/static/logo.svg" alt="TRACES">
            <h1>TRACES</h1>
            <p class="text-muted">Create your admin account</p>
        </div>
        <form id="setup-form">
            <div id="setup-error" class="alert alert-danger d-none" role="alert"></div>
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" name="username" required autofocus autocomplete="username">
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" name="password" required autocomplete="new-password">
            </div>
            <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-control" name="confirm_password" required autocomplete="new-password">
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="fa-solid fa-user-plus me-2" aria-hidden="true"></i> Create Account
            </button>
        </form>
    </div>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      function toggleTheme(){var t=document.documentElement.getAttribute('data-theme');t=t==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',t);localStorage.setItem('theme',t);document.getElementById('theme-icon').className=t==='dark'?'fa-solid fa-sun':'fa-solid fa-moon'}
      document.addEventListener('DOMContentLoaded',function(){var t=document.documentElement.getAttribute('data-theme');document.getElementById('theme-icon').className=t==='dark'?'fa-solid fa-sun':'fa-solid fa-moon'});
    </script>
    <script type="module" src="/static/js/setup.js"></script>
</body>
</html>
