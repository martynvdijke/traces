<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRACES - Your Year in Review</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
</head>
<body>
    <div class="vintage-overlay"></div>
    
    <header class="py-4">
        <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center position-relative">
            <div class="logo">
                <img src="/static/logo.svg" alt="TRACES Logo" width="60" height="60" class="me-2">
                <div>TRACES<span>Your Year in Review</span></div>
                <div class="ms-3 d-none d-lg-block border-start ps-3 small opacity-50" style="font-family: 'DM Sans', sans-serif; letter-spacing: 1px; text-transform: uppercase;">Timeline of<br>Memories</div>
            </div>
            <div class="racing-stripes"></div>
            <nav class="mt-3 mt-md-0 d-flex align-items-center gap-4">
                <ul class="mb-0 d-flex gap-3 list-unstyled">
                    <li><a href="#timeline" class="active text-uppercase"><i class="fa-solid fa-clock me-2"></i>Timeline</a></li>
                    <li><a href="#contributions" class="text-uppercase"><i class="fa-solid fa-chart-pie me-2"></i>Activity</a></li>
                    <li><a href="#gallery" class="text-uppercase"><i class="fa-solid fa-images me-2"></i>Gallery</a></li>
                    <li><a href="/docs" class="text-uppercase" target="_blank"><i class="fa-solid fa-book me-2"></i>API Docs</a></li>
                    <li><a href="/login.html" class="text-uppercase"><i class="fa-solid fa-lock me-2"></i>Admin</a></li>
                </ul>
                <button id="theme-toggle" class="theme-toggle ms-3" aria-label="Toggle Theme">
                    <i class="fa-solid fa-moon"></i>
                </button>
            </nav>
        </div>
    </header>

    <main class="container my-5">
        <section class="year-selector mb-5">
            <div class="row align-items-center g-4">
                <div class="col-md-4">
                    <h2 class="mb-0"><i class="fa-solid fa-calendar me-2"></i>Year <span id="current-year">2026</span></h2>
                </div>
                <div class="col-md-8">
                    <div class="d-flex gap-2 flex-wrap">
                        <button class="btn btn-outline-primary" onclick="changeYear(2026)">2026</button>
                        <button class="btn btn-outline-primary" onclick="changeYear(2025)">2025</button>
                        <button class="btn btn-outline-primary" onclick="changeYear(2024)">2024</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="contribution-hero mb-5" id="contributions">
            <div class="row align-items-stretch g-4">
                <div class="col-lg-8">
                    <div class="contribution-card">
                        <div class="contribution-header">
                            <h3><i class="fa-solid fa-chart-pie me-2"></i>Activity Overview</h3>
                            <span class="badge bg-primary" id="total-events">0 events</span>
                        </div>
                        <div class="contribution-graph" id="contribution-graph">
                        </div>
                        <div class="contribution-legend">
                            <span class="legend-label">Less</span>
                            <div class="legend-squares">
                                <div class="level level-0"></div>
                                <div class="level level-1"></div>
                                <div class="level level-2"></div>
                                <div class="level level-3"></div>
                                <div class="level level-4"></div>
                            </div>
                            <span class="legend-label">More</span>
                        </div>
                    </div>
                </div>
                <div class="col-lg-4">
                    <div class="stats-grid">
                        <div class="stat-card">
                            <i class="fa-solid fa-image"></i>
                            <span class="stat-value" id="stat-images">0</span>
                            <span class="stat-label">Images</span>
                        </div>
                        <div class="stat-card">
                            <i class="fa-solid fa-video"></i>
                            <span class="stat-value" id="stat-videos">0</span>
                            <span class="stat-label">Videos</span>
                        </div>
                        <div class="stat-card">
                            <i class="fa-solid fa-music"></i>
                            <span class="stat-value" id="stat-audio">0</span>
                            <span class="stat-label">Audio</span>
                        </div>
                        <div class="stat-card">
                            <i class="fa-solid fa-map-marker-alt"></i>
                            <span class="stat-value" id="stat-locations">0</span>
                            <span class="stat-label">Locations</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="month-filter mb-4">
            <div class="d-flex gap-2 flex-wrap">
                <button class="btn btn-sm btn-dark active" onclick="filterMonth(0)">All Year</button>
                <button class="btn btn-sm btn-outline-dark" onclick="filterMonth(1)">Jan</button>
                <button class="btn btn-sm btn-outline-dark" onclick="filterMonth(2)">Feb</button>
                <button class="btn btn-sm btn-outline-dark" onclick="filterMonth(3)">Mar</button>
                <button class="btn btn-sm btn-outline-dark" onclick="filterMonth(4)">Apr</button>
                <button class="btn btn-sm btn-outline-dark" onclick="filterMonth(5)">May</button>
                <button class="btn btn-sm btn-outline-dark" onclick="filterMonth(6)">Jun</button>
                <button class="btn btn-sm btn-outline-dark" onclick="filterMonth(7)">Jul</button>
                <button class="btn btn-sm btn-outline-dark" onclick="filterMonth(8)">Aug</button>
                <button class="btn btn-sm btn-outline-dark" onclick="filterMonth(9)">Sep</button>
                <button class="btn btn-sm btn-outline-dark" onclick="filterMonth(10)">Oct</button>
                <button class="btn btn-sm btn-outline-dark" onclick="filterMonth(11)">Nov</button>
                <button class="btn btn-sm btn-outline-dark" onclick="filterMonth(12)">Dec</button>
            </div>
        </section>

        <section id="timeline" class="timeline-section mb-5">
            <div class="timeline" id="timeline-container">
            </div>
        </section>

        <section id="gallery" class="gallery-section mb-5">
            <h2 class="mb-4"><i class="fa-solid fa-images me-2"></i>Media Gallery</h2>
            <div class="row g-4" id="gallery-container">
            </div>
        </section>
    </main>

    <div class="modal fade" id="mediaModal" tabindex="-1">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content bg-dark">
                <div class="modal-header border-0">
                    <h5 class="modal-title text-white" id="mediaModalTitle">Event</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center" id="mediaModalBody">
                </div>
                <div class="modal-footer border-0">
                    <p class="text-white-50 mb-0" id="mediaModalDesc"></p>
                </div>
            </div>
        </div>
    </div>

    <footer class="py-5 mt-5">
        <div class="container text-center">
            <p class="mb-0 text-uppercase fw-bold"><i class="fa-solid fa-clock mx-2"></i> 2026 TRACES <i class="fa-solid fa-clock mx-2"></i></p>
            <span class="small opacity-50 text-uppercase letter-spacing-2 mt-2 d-block">Your memories, beautifully preserved.</span>
            <span class="small opacity-50 text-uppercase letter-spacing-2 mt-2 d-block" id="version-display">Version loading...</span>
        </div>
    </footer>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = themeToggle.querySelector('i');
        const setTheme = (theme) => {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            themeIcon.className = theme === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        };
        const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        setTheme(savedTheme);
        themeToggle.addEventListener('click', () => setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));

        let currentYear = new Date().getFullYear();
        let currentMonth = 0;
        let events = [];
        let contributions = {};

        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 
                          'July', 'August', 'September', 'October', 'November', 'December'];

        function changeYear(year) {
            currentYear = year;
            document.getElementById('current-year').textContent = year;
            loadData();
        }

        function filterMonth(month) {
            currentMonth = month;
            document.querySelectorAll('.month-filter .btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === month);
                btn.classList.toggle('btn-dark', i === month);
                btn.classList.toggle('btn-outline-dark', i !== month);
            });
            renderTimeline();
            renderGallery();
        }

        async function loadContributions() {
            try {
                const res = await fetch('/api/contributions?year=' + currentYear);
                contributions = await res.json();
                renderContributionGraph();
                updateStats();
            } catch (err) {
                console.error('Failed to load contributions:', err);
            }
        }

        function renderContributionGraph() {
            const graph = document.getElementById('contribution-graph');
            const firstDay = new Date(currentYear, 0, 1);
            const startDay = firstDay.getDay();
            const daysInYear = (currentYear % 4 === 0 && currentYear % 100 !== 0) || currentYear % 400 === 0 ? 366 : 365;
            
            const maxCount = Math.max(...Object.values(contributions), 1);
            
            let html = '<div class="graph-months">';
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            let currentMonth = -1;
            months.forEach((m, i) => {
                if (i === 0 || new Date(currentYear, i, 1).getDay() === 0) {
                    html += '<span class="month-label">' + m + '</span>';
                    currentMonth = i;
                }
            });
            html += '</div>';
            
            html += '<div class="graph-grid"><div class="graph-days">';
            for (let i = 0; i < startDay; i++) {
                html += '<div class="day-cell empty"></div>';
            }
            
            for (let day = 1; day <= daysInYear; day++) {
                const date = currentYear + '-' + String(day).padStart(3, '0').slice(0, -2) + '-' + String(day).padStart(3, '0').slice(-2);
                const dateObj = new Date(currentYear, 0, day);
                const dateStr = dateObj.toISOString().split('T')[0];
                const count = contributions[dateStr] || 0;
                let level = 0;
                if (count > 0) level = Math.ceil((count / maxCount) * 4);
                
                html += '<div class="day-cell level-' + level + '" data-date="' + dateStr + '" data-count="' + count + '" title="' + dateStr + ': ' + count + ' event(s)"></div>';
                
                if (dateObj.getDay() === 6 && day < daysInYear) {
                    html += '</div><div class="graph-days">';
                }
            }
            html += '</div></div>';
            
            graph.innerHTML = html;
        }

        function updateStats() {
            const filtered = currentMonth > 0 
                ? events.filter(e => new Date(e.date).getMonth() + 1 === currentMonth)
                : events;
            
            document.getElementById('total-events').textContent = filtered.length + ' events';
            
            const images = filtered.filter(e => e.media_type === 'image').length;
            const videos = filtered.filter(e => e.media_type === 'video').length;
            const audio = filtered.filter(e => e.media_type === 'audio').length;
            const locations = new Set(filtered.map(e => e.location).filter(l => l)).size;
            
            document.getElementById('stat-images').textContent = images;
            document.getElementById('stat-videos').textContent = videos;
            document.getElementById('stat-audio').textContent = audio;
            document.getElementById('stat-locations').textContent = locations;
        }

        async function loadEvents() {
            try {
                let url = '/api/events?year=' + currentYear;
                if (currentMonth > 0) {
                    url += '&month=' + String(currentMonth).padStart(2, '0');
                }
                const res = await fetch(url);
                events = await res.json();
                renderTimeline();
                renderGallery();
            } catch (err) {
                console.error('Failed to load events:', err);
            }
        }

        async function loadData() {
            await Promise.all([loadEvents(), loadContributions()]);
        }

        function renderTimeline() {
            const container = document.getElementById('timeline-container');
            
            const filteredEvents = currentMonth > 0 
                ? events.filter(e => new Date(e.date).getMonth() + 1 === currentMonth)
                : events;

            if (filteredEvents.length === 0) {
                container.innerHTML = `
                    <div class="text-center text-muted py-5">
                        <i class="fa-solid fa-clock fa-3x mb-3"></i>
                        <p>No events found for ${currentYear}.</p>
                    </div>
                `;
                return;
            }

            let currentMonth = -1;
            let html = '';

            filteredEvents.forEach((e, index) => {
                const eventDate = new Date(e.date);
                const month = eventDate.getMonth();

                if (month !== currentMonth) {
                    currentMonth = month;
                    html += `
                        <div class="timeline-month-label">
                            <span class="badge bg-primary">${monthNames[month]}</span>
                        </div>
                    `;
                }

                const mediaIcon = getMediaIcon(e.media_type);
                const hasMedia = e.media_url;

                html += `
                    <div class="timeline-item ${index % 2 === 0 ? 'left' : 'right'}">
                        <div class="timeline-content" onclick="${hasMedia ? 'showMedia(' + e.id + ')' : ''}">
                            <div class="timeline-date">${formatDate(e.date)}</div>
                            <div class="timeline-title">${escapeHtml(e.title)}</div>
                            <div class="timeline-location"><i class="fa-solid fa-location-dot me-1"></i>${escapeHtml(e.location)}</div>
                            ${e.description ? '<p class="timeline-desc">' + escapeHtml(e.description) + '</p>' : ''}
                            ${hasMedia ? '<div class="timeline-media-badge"><i class="' + mediaIcon + '"></i> ' + e.media_type + '</div>' : ''}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function getMediaIcon(mediaType) {
            switch(mediaType) {
                case 'video': return 'fa-solid fa-video';
                case 'audio': return 'fa-solid fa-music';
                default: return 'fa-solid fa-image';
            }
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }

        function renderGallery() {
            const container = document.getElementById('gallery-container');
            
            const filtered = currentMonth > 0 
                ? events.filter(e => new Date(e.date).getMonth() + 1 === currentMonth)
                : events;
            const mediaEvents = filtered.filter(e => e.media_url);

            if (mediaEvents.length === 0) {
                container.innerHTML = `
                    <div class="col-12 text-center text-muted py-5">
                        <i class="fa-solid fa-images fa-3x mb-3"></i>
                        <p>No media found for ${currentYear}.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = mediaEvents.map(e => `
                <div class="col-md-4 col-lg-3">
                    <div class="gallery-item" onclick="showMedia(${e.id})">
                        ${e.media_type === 'video' 
                            ? '<video src="' + e.media_url + '" muted></video>'
                            : e.media_type === 'audio'
                            ? '<div class="audio-placeholder"><i class="fa-solid fa-music fa-3x"></i></div>'
                            : '<img src="' + (e.thumbnail || e.media_url) + '" alt="' + escapeHtml(e.title) + '">'
                        }
                        <div class="gallery-overlay">
                            <i class="${getMediaIcon(e.media_type)}"></i>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function showMedia(id) {
            const event = events.find(e => e.id === id);
            if (!event) return;

            document.getElementById('mediaModalTitle').textContent = event.title;
            document.getElementById('mediaModalDesc').innerHTML = `
                ${event.description || ''}
                <div class="mt-2 small opacity-75">
                    <i class="fa-solid fa-calendar me-1"></i>${event.date}
                    ${event.location ? '<i class="fa-solid fa-location-dot ms-2 me-1"></i>' + event.location : ''}
                </div>
            `;

            let mediaHtml = '';
            if (event.media_url) {
                if (event.media_type === 'video') {
                    mediaHtml = '<video controls class="w-100" src="' + event.media_url + '"></video>';
                } else if (event.media_type === 'audio') {
                    mediaHtml = '<audio controls class="w-100" src="' + event.media_url + '"></audio>';
                } else {
                    mediaHtml = '<img src="' + event.media_url + '" class="img-fluid" alt="' + event.title + '">';
                }
            }

            document.getElementById('mediaModalBody').innerHTML = mediaHtml || '<p>No media available</p>';
            new bootstrap.Modal(document.getElementById('mediaModal')).show();
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/&/g, '&amp;')
                      .replace(/</g, '&lt;')
                      .replace(/>/g, '&gt;')
                      .replace(/"/g, '&quot;')
                      .replace(/'/g, '&#039;');
        }

        loadData();

        fetch('/api/version').then(r => r.json()).then(d => {
            document.getElementById('version-display').textContent = 'v' + d.version;
        }).catch(() => {
            document.getElementById('version-display').textContent = 'v1.0.0';
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
