<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRACES - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <style>
        :root {
            --primary: #7c3aed;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
        }
        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-logo img {
            width: 60px;
            height: 60px;
            border-radius: 12px;
        }
        .login-logo h1 {
            font-family: 'Space Mono', monospace;
            font-size: 1.5rem;
            color: #7c3aed;
            margin-top: 0.5rem;
        }
        .form-control:focus {
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }
        .btn-primary {
            background: #7c3aed;
            border-color: #7c3aed;
        }
        .btn-primary:hover {
            background: #6d28d9;
            border-color: #6d28d9;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <img src="/static/logo.svg" alt="TRACES">
            <h1>TRACES</h1>
            <p class="text-muted">Sign in to manage events</p>
        </div>
        <form id="login-form">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" name="username" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="fa-solid fa-sign-in-alt me-2"></i> Sign In
            </button>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        username: formData.get('username'),
                        password: formData.get('password')
                    })
                });
                if (res.ok) {
                    window.location.href = '/admin.html';
                } else {
                    const data = await res.json();
                    alert(data.error || 'Invalid credentials');
                }
            } catch (err) {
                alert('Login failed: ' + err.message);
            }
        });
    </script>
    <script>
        fetch('/api/config').then(function(r){return r.json();}).then(function(cfg){
            if(cfg.umami_url&&cfg.umami_site){var s=document.createElement('script');s.async=true;s.defer=true;s.src=cfg.umami_url+'/script.js';s.setAttribute('data-website-id',cfg.umami_site);document.head.appendChild(s);}
        }).catch(function(){});
    </script>
</body>
</html>
