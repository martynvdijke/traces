<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRACES - Map View</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <script>
      (function(){function a(){document.documentElement.classList.add('eink-mode');var l=document.createElement('link');l.rel='stylesheet';l.href='/static/eink.css';document.head.appendChild(l)}var e=new URLSearchParams(window.location.search).get('eink');if(e==='1'){document.cookie='eink=1;path=/;max-age='+31536000;a()}else if(e==='0'){document.cookie='eink=;path=/;max-age=0'}else{var c=document.cookie.split(';');for(var i=0;i<c.length;i++){if(c[i].trim().indexOf('eink=1')===0){a();break}}}fetch('/api/config').then(function(r){return r.json()}).then(function(c){if(c.eink_enabled&&!document.documentElement.classList.contains('eink-mode')){a()}}).catch(function(){})})();
    </script>
    <style>
        :root { --traces-primary: #7c3aed; --traces-dark: #111; }
        html, body { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .map-header { background: var(--traces-dark); color: white; padding: 0.75rem 1rem; border-bottom: 4px solid var(--traces-primary); position: relative; z-index: 1000; }
        .map-header h1 { font-size: clamp(1rem, 3vw, 1.5rem); margin: 0; }
        .map-container { display: flex; height: calc(100vh - 57px); }
        #map { flex: 1; height: 100%; }
        .map-sidebar { width: 350px; background: #f8f9fa; border-left: 1px solid #dee2e6; overflow-y: auto; padding: 1rem; }
        .map-sidebar h3 { font-size: 1rem; font-weight: 700; margin-bottom: 1rem; color: var(--traces-primary); }
        .event-marker-item { background: white; border-radius: 8px; padding: 0.75rem; margin-bottom: 0.5rem; cursor: pointer; border: 1px solid #e5e7eb; transition: all 0.2s; }
        .event-marker-item:hover { border-color: var(--traces-primary); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .event-marker-item .date { font-size: 0.75rem; color: var(--traces-primary); font-weight: 600; }
        .event-marker-item .title { font-size: 0.9rem; font-weight: 600; }
        .event-marker-item .location { font-size: 0.8rem; color: #6b7280; }
        .empty-state { text-align: center; color: #9ca3af; padding: 2rem; }
        .empty-state i { font-size: 3rem; margin-bottom: 1rem; }
        @media (max-width: 768px) {
            .map-container { flex-direction: column; }
            .map-sidebar { width: 100%; max-height: 200px; border-left: none; border-top: 1px solid #dee2e6; }
            #map { height: calc(100vh - 57px - 200px); }
        }
    </style>
</head>
<body>
    <header class="map-header">
        <div class="d-flex justify-content-between align-items-center">
            <h1><i class="fa-solid fa-map me-2" aria-hidden="true"></i>TRACES MAP</h1>
            <div>
                <a href="/" class="btn btn-outline-light btn-sm me-2"><i class="fa-solid fa-clock me-1" aria-hidden="true"></i> Timeline</a>
                <a href="/admin.html" class="btn btn-outline-light btn-sm"><i class="fa-solid fa-gear me-1" aria-hidden="true"></i> Admin</a>
            </div>
        </div>
    </header>
    <div class="map-container">
        <div id="map"></div>
        <div class="map-sidebar" id="sidebar">
            <h3><i class="fa-solid fa-list me-2" aria-hidden="true"></i>Events on Map</h3>
            <div id="event-list"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="/static/js/map.js"></script>
</body>
</html>
