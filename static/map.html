<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRACES - Map View</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <style>
        :root { --traces-primary: #7c3aed; --traces-dark: #111; }
        html, body { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .map-header { background: var(--traces-dark); color: white; padding: 0.75rem 1rem; border-bottom: 4px solid var(--traces-primary); position: relative; z-index: 1000; }
        .map-header h1 { font-size: clamp(1rem, 3vw, 1.5rem); margin: 0; }
        .map-container { display: flex; height: calc(100vh - 57px); }
        #map { flex: 1; height: 100%; }
        .map-sidebar { width: 350px; background: #f8f9fa; border-left: 1px solid #dee2e6; overflow-y: auto; padding: 1rem; }
        .map-sidebar h3 { font-size: 1rem; font-weight: 700; margin-bottom: 1rem; color: var(--traces-primary); }
        .event-marker-item { background: white; border-radius: 8px; padding: 0.75rem; margin-bottom: 0.5rem; cursor: pointer; border: 1px solid #e5e7eb; transition: all 0.2s; }
        .event-marker-item:hover { border-color: var(--traces-primary); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .event-marker-item .date { font-size: 0.75rem; color: var(--traces-primary); font-weight: 600; }
        .event-marker-item .title { font-size: 0.9rem; font-weight: 600; }
        .event-marker-item .location { font-size: 0.8rem; color: #6b7280; }
        .empty-state { text-align: center; color: #9ca3af; padding: 2rem; }
        .empty-state i { font-size: 3rem; margin-bottom: 1rem; }
        @media (max-width: 768px) {
            .map-container { flex-direction: column; }
            .map-sidebar { width: 100%; max-height: 200px; border-left: none; border-top: 1px solid #dee2e6; }
            #map { height: calc(100vh - 57px - 200px); }
        }
    </style>
</head>
<body>
    <header class="map-header">
        <div class="d-flex justify-content-between align-items-center">
            <h1><i class="fa-solid fa-map me-2"></i>TRACES MAP</h1>
            <div>
                <a href="/" class="btn btn-outline-light btn-sm me-2"><i class="fa-solid fa-clock me-1"></i> Timeline</a>
                <a href="/admin.html" class="btn btn-outline-light btn-sm"><i class="fa-solid fa-gear me-1"></i> Admin</a>
            </div>
        </div>
    </header>
    <div class="map-container">
        <div id="map"></div>
        <div class="map-sidebar" id="sidebar">
            <h3><i class="fa-solid fa-list me-2"></i>Events on Map</h3>
            <div id="event-list"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map;
        let markers = [];
        let mapEvents = [];

        function initMap() {
            map = L.map('map').setView([40.7128, -74.0060], 5);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
                maxZoom: 19
            }).addTo(map);
            loadMapData();
        }

        async function loadMapData() {
            try {
                const res = await fetch('/api/map');
                const data = await res.json();
                mapEvents = data.features || [];
                renderMarkers();
                renderEventList();
            } catch (err) {
                console.error('Failed to load map data:', err);
                document.getElementById('event-list').innerHTML = '<div class="empty-state"><i class="fa-solid fa-triangle-exclamation"></i><p>Failed to load map data</p></div>';
            }
        }

        function renderMarkers() {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            if (mapEvents.length === 0) return;

            const bounds = [];
            const mediaIcons = {
                image: L.divIcon({ className: 'map-marker-icon', html: '<div style="background:#7c3aed;color:white;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 6px rgba(0,0,0,0.3)"><i class="fa-solid fa-image"></i></div>', iconSize: [28, 28], iconAnchor: [14, 14] }),
                video: L.divIcon({ className: 'map-marker-icon', html: '<div style="background:#ef4444;color:white;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 6px rgba(0,0,0,0.3)"><i class="fa-solid fa-video"></i></div>', iconSize: [28, 28], iconAnchor: [14, 14] }),
                audio: L.divIcon({ className: 'map-marker-icon', html: '<div style="background:#f59e0b;color:white;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 6px rgba(0,0,0,0.3)"><i class="fa-solid fa-music"></i></div>', iconSize: [28, 28], iconAnchor: [14, 14] }),
                default: L.divIcon({ className: 'map-marker-icon', html: '<div style="background:#6b7280;color:white;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 6px rgba(0,0,0,0.3)"><i class="fa-solid fa-location-dot"></i></div>', iconSize: [28, 28], iconAnchor: [14, 14] })
            };

            mapEvents.forEach(event => {
                if (!event.latitude || !event.longitude) return;
                const icon = mediaIcons[event.media_type] || mediaIcons.default;
                const marker = L.marker([event.latitude, event.longitude], { icon: icon }).addTo(map);
                const mediaHtml = event.media_url
                    ? (event.media_type === 'image' ? '<img src="'+event.media_url+'" style="max-width:200px;border-radius:4px;margin-top:8px">'
                        : event.media_type === 'video' ? '<video controls style="max-width:200px;border-radius:4px;margin-top:8px" src="'+event.media_url+'"></video>'
                        : '<audio controls style="margin-top:8px" src="'+event.media_url+'"></audio>')
                    : '';
                marker.bindPopup('<div style="min-width:150px"><strong>'+event.title+'</strong><br><small style="color:#7c3aed">'+event.date+'</small><br><small>'+ (event.location||'') +'</small>'+(event.description ? '<p style="margin-top:4px;font-size:0.85rem">'+event.description+'</p>' : '')+mediaHtml+'</div>');
                markers.push(marker);
                bounds.push([event.latitude, event.longitude]);
            });

            if (bounds.length > 0) map.fitBounds(bounds, { padding: [50, 50], maxZoom: 12 });
        }

        function renderEventList() {
            const list = document.getElementById('event-list');
            if (mapEvents.length === 0) {
                list.innerHTML = '<div class="empty-state"><i class="fa-solid fa-map-marker-alt"></i><p>No events with location data</p><small>Add latitude and longitude to events in the admin panel to see them here.</small></div>';
                return;
            }
            list.innerHTML = mapEvents.map((event, index) => '<div class="event-marker-item" onclick="focusEvent('+index+')"><div class="date"><i class="fa-solid fa-calendar me-1"></i>'+event.date+'</div><div class="title">'+event.title+'</div><div class="location"><i class="fa-solid fa-location-dot me-1"></i>'+(event.location||'Unknown')+'</div>'+(event.media_type ? '<span class="badge bg-secondary" style="font-size:0.7rem">'+event.media_type+'</span>' : '')+'</div>').join('');
        }

        function focusEvent(index) {
            const event = mapEvents[index];
            if (event.latitude && event.longitude) {
                map.setView([event.latitude, event.longitude], 14, { animate: true });
                markers[index].openPopup();
            }
        }

        initMap();
    </script>
</body>
</html>
